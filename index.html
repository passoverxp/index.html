<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack - Cloud Sync</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .logout-btn { background: #dc3545; }
        .transaction-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

    <div id="loginScreen" class="container">
        <h2>Welcome to FinTrack</h2>
        <input type="email" id="emailInput" placeholder="Enter Email">
        <input type="password" id="passwordInput" placeholder="Enter Password">
        <button id="loginBtn">Login</button>
        <button id="signupBtn" style="background: #28a745;">Sign Up</button>
        <p id="authError" style="color: red; font-size: 14px;"></p>
    </div>

    <div id="dashboardScreen" class="container hidden">
        <h2>Dashboard</h2>
        <p>Logged in as: <span id="userEmailDisplay"></span></p>
        <button id="logoutBtn" class="logout-btn">Logout</button>

        <hr>

        <h3>Add Transaction</h3>
        <input type="text" id="descInput" placeholder="Description (e.g., Groceries)">
        <input type="number" id="amountInput" placeholder="Amount (e.g., 50)">
        <button id="addTransactionBtn">Add Transaction</button>

        <h3>Your Transactions</h3>
        <div id="transactionsList">
            </div>
    </div>

    <script type="module">
        // 1. Import Firebase Core, Auth, and Firestore
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // 2. PASTE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "AIzaSyAkBKhyDepFOkpE0II9GgjwSO5G1CH9A_4",
            authDomain: "index-1d611.firebaseapp.com",
            projectId: "your-project-id",
            storageBucket: "your-project-id.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdefg"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI Elements
        const loginScreen = document.getElementById('loginScreen');
        const dashboardScreen = document.getElementById('dashboardScreen');
        const authError = document.getElementById('authError');
        const transactionsList = document.getElementById('transactionsList');

        // ==========================================
        // AUTHENTICATION LOGIC
        // ==========================================

        // Sign Up
        document.getElementById('signupBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                authError.innerText = ""; // Clear errors
            } catch (error) {
                authError.innerText = error.message;
            }
        });

        // Login
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                authError.innerText = "";
            } catch (error) {
                authError.innerText = error.message;
            }
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth);
        });

        // Listen for Login State Changes (The "Gatekeeper")
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is logged in: Show Dashboard, load their specific data
                loginScreen.classList.add('hidden');
                dashboardScreen.classList.remove('hidden');
                document.getElementById('userEmailDisplay').innerText = user.email;
                loadTransactions(user.uid); 
            } else {
                // User is logged out: Show Login screen
                loginScreen.classList.remove('hidden');
                dashboardScreen.classList.add('hidden');
            }
        });

        // ==========================================
        // DATABASE LOGIC (FIRESTORE)
        // ==========================================

        // Add Data to Database
        document.getElementById('addTransactionBtn').addEventListener('click', async () => {
            const desc = document.getElementById('descInput').value;
            const amount = document.getElementById('amountInput').value;
            const user = auth.currentUser;

            if (desc && amount && user) {
                try {
                    // Save to the "transactions" collection
                    await addDoc(collection(db, "transactions"), {
                        uid: user.uid,         // Links the data to the specific logged-in user
                        description: desc,
                        amount: Number(amount),
                        timestamp: new Date()
                    });
                    
                    // Clear inputs and reload list
                    document.getElementById('descInput').value = '';
                    document.getElementById('amountInput').value = '';
                    loadTransactions(user.uid);
                } catch (error) {
                    console.error("Error adding document: ", error);
                }
            }
        });

        // Load Data from Database
        async function loadTransactions(userId) {
            transactionsList.innerHTML = "Loading...";
            
            // Query: Get transactions ONLY where the uid matches the logged-in user
            const q = query(collection(db, "transactions"), where("uid", "==", userId));
            const querySnapshot = await getDocs(q);
            
            transactionsList.innerHTML = ""; // Clear loading text
            
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'transaction-item';
                div.innerHTML = `<span>${data.description}</span> <span>$${data.amount}</span>`;
                transactionsList.appendChild(div);
            });
        }
    </script>
</body>
</html>
