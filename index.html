<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinTrack — Your Money, Simplified</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #00e5a0;
    --accent2: #ff6b6b;
    --accent3: #ffd166;
    --text: #f0f0f8;
    --muted: #6b6b88;
    --income: #00e5a0;
    --expense: #ff6b6b;
    
    /* Premium Visual Design Tokens */
    --premium-grad: linear-gradient(135deg, #16122c 0%, #0b071e 100%);
    --gold: #ffd700;
    --gold-glow: rgba(255, 215, 0, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(0,229,160,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255,107,107,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .hidden { display: none !important; }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    padding: 28px 0 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: fadeDown 0.6s ease both;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  .badge {
    font-size: 0.65rem;
    padding: 4px 10px;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Summary Cards */
  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin: 32px 0;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s ease both;
    transition: transform 0.2s, border-color 0.2s;
  }

  .card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.2s; }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
  }

  .card.expense::before { background: var(--expense); }
  .card.balance::before { background: var(--accent3); }

  .card-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
  }

  .card-amount {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -1px;
  }

  .card.income .card-amount { color: var(--income); }
  .card.expense .card-amount { color: var(--expense); }
  .card.balance .card-amount { color: var(--accent3); }

  .card-icon {
    position: absolute;
    top: 20px; right: 20px;
    font-size: 1.5rem;
    opacity: 0.3;
  }

  /* Main Layout */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 24px;
    margin-bottom: 40px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    animation: fadeUp 0.6s ease 0.3s both;
  }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 24px;
    color: var(--text);
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title::before {
    content: ''; width: 8px; height: 8px; background: var(--accent);
    border-radius: 50%; display: inline-block;
  }

  .form-group { margin-bottom: 16px; }

  label {
    display: block; font-size: 0.7rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
  }

  input, select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 0.9rem;
    transition: border-color 0.2s, box-shadow 0.2s; outline: none;
  }

  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,160,0.1); }
  input::placeholder { color: var(--muted); }

  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .type-btn {
    padding: 10px; border-radius: 10px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 1px;
  }

  .type-btn:hover { background: var(--surface2); }
  .type-btn.active.income { background: rgba(0,229,160,0.1); border-color: var(--income); color: var(--income); }
  .type-btn.active.expense { background: rgba(255,107,107,0.1); border-color: var(--expense); color: var(--expense); }

  .nav-btn {
    padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border);
    background: transparent; color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .nav-btn:hover { background: var(--surface2); border-color: var(--accent); }
  .nav-btn.active { background: rgba(0,229,160,0.1); border-color: var(--accent); color: var(--accent); }

  .submit-btn {
    width: 100%; padding: 14px; background: var(--accent); color: #0a0a0f;
    border: none; border-radius: 10px; font-family: 'Syne', sans-serif;
    font-size: 0.9rem; font-weight: 700; cursor: pointer;
    letter-spacing: 0.5px; margin-top: 8px; transition: all 0.2s;
    text-transform: uppercase;
  }
  .submit-btn:hover { background: #00ffb3; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,229,160,0.3); }

  /* Chart Elements */
  .chart-section { margin-bottom: 24px; }
  .chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 80px; padding: 8px 0; }
  .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
  .bar { width: 100%; border-radius: 4px 4px 0 0; transition: height 0.4s; min-height: 4px; }
  .bar.income-bar { background: var(--income); opacity: 0.8; }
  .bar.expense-bar { background: var(--expense); opacity: 0.8; }
  .bar-label { font-size: 0.6rem; color: var(--muted); text-align: center; }
  .chart-legend { display: flex; gap: 16px; margin-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.7rem; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* Transaction Rows */
  .tx-list { display: flex; flex-direction: column; gap: 10px; }
  .tx-item {
    display: flex; align-items: center; justify-content: space-between; padding: 14px 16px;
    background: var(--surface2); border-radius: 12px; border: 1px solid transparent; transition: all 0.2s;
  }
  .tx-item:hover { border-color: var(--border); transform: translateX(4px); }
  .tx-left { display: flex; align-items: center; gap: 12px; }
  .tx-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
  .tx-icon.income { background: rgba(0,229,160,0.1); }
  .tx-icon.expense { background: rgba(255,107,107,0.1); }
  .tx-name { font-size: 0.85rem; color: var(--text); margin-bottom: 2px; }
  .tx-meta { font-size: 0.65rem; color: var(--muted); }
  .tx-amount { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
  .tx-amount.income { color: var(--income); }
  .tx-amount.expense { color: var(--expense); }
  .tx-delete {
    background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.8rem;
    padding: 4px 6px; border-radius: 6px; margin-left: 8px; opacity: 0; transition: all 0.2s;
  }
  .tx-item:hover .tx-delete { opacity: 1; }
  .tx-delete:hover { background: rgba(255,107,107,0.15); color: var(--expense); }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 0.8rem; line-height: 1.8; }
  .empty-state .emoji { font-size: 2rem; display: block; margin-bottom: 12px; }

  /* Chips */
  .categories { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .cat-chip {
    padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.65rem;
    cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px;
  }
  .cat-chip:hover, .cat-chip.selected { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,0.08); }

  /* Overlays */
  .login-container {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .login-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  }

  /* PREMIUM UI CORE HOOKS */
  .premium-panel {
    background: var(--premium-grad);
    border: 1px solid var(--gold);
    box-shadow: 0 0 25px var(--gold-glow);
    position: relative;
    overflow: hidden;
    animation: premiumEntrance 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  
  .premium-tag {
    position: absolute;
    top: 14px; right: 14px;
    font-size: 0.55rem; font-weight: 800;
    color: var(--bg); background: var(--gold);
    padding: 3px 8px; border-radius: 4px;
    letter-spacing: 1px; text-transform: uppercase;
  }

  .premium-title::before { background: var(--gold) !important; }

  /* Progress Arc Bar */
  .progress-container {
    background: var(--surface2); height: 12px; border-radius: 6px;
    overflow: hidden; display: flex; margin: 16px 0; border: 1px solid var(--border);
  }
  .progress-fill-spend { background: var(--accent2); transition: width 0.4s ease; }
  .progress-fill-reserve { background: var(--gold); transition: width 0.4s ease; }

  .premium-btn {
    background: linear-gradient(90deg, var(--gold) 0%, #f59e0b 100%) !important;
    color: #0a0a0f !important; font-weight: 800 !important;
    box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
  }
  .premium-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(245, 158, 11, 0.5); }

  .metric-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 18px 0; }
  .metric-box { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
  .metric-val { font-family: 'Syne', sans-serif; font-size: 1.25rem; font-weight: 700; margin-top: 4px; }

  @keyframes premiumEntrance {
    from { opacity: 0; transform: scale(0.97) translateY(10px); filter: blur(4px); }
    to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
  }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="login-container hidden" id="onboardingScreen">
  <div class="login-box">
    <div class="logo" style="text-align: center; margin-bottom: 8px;">Fin<span>Track</span></div>
    <h2 style="font-size: 1.2rem; margin-bottom: 20px; text-align: center;">Welcome! Let's set up your profile.</h2>
    <div class="form-group">
      <label>Your Name</label>
      <input type="text" id="userNameInput" placeholder="John Doe" />
    </div>
    <div class="form-group">
      <label>Main Monthly Income ($)</label>
      <input type="number" id="mainIncomeInput" placeholder="e.g. 3000" />
    </div>
    <div class="form-group">
      <label>Main Monthly Expense ($)</label>
      <input type="number" id="mainExpenseInput" placeholder="e.g. 1000" />
    </div>
    <button class="submit-btn" onclick="completeOnboarding()">Save & Start Tracking</button>
  </div>
</div>

<div class="login-container hidden" id="loginScreen">
  <div class="login-box">
    <div class="logo" style="text-align: center; margin-bottom: 8px;">Fin<span>Track</span></div>
    <p style="color: var(--muted); text-align: center; font-size: 0.8rem; margin-bottom: 24px;">Please sign in to access your dashboard</p>
    <div class="form-group">
      <label>Username / Email</label>
      <input type="text" id="username" placeholder="enter any username" value="admin" />
    </div>
    <div class="form-group" style="margin-bottom: 24px;">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" value="password" />
    </div>
    <button class="submit-btn" id="loginBtn" onclick="handleLogin()">Sign In</button>
  </div>
</div>

<div class="container">
  <header>
    <nav style="display: flex; gap: 10px;">
      <button id="navDashboard" class="nav-btn active" onclick="switchScreen('dashboardScreen', 'navDashboard')">Dashboard</button>
      <button id="navCoach" class="nav-btn" onclick="switchScreen('coachScreen', 'navCoach')">Financial Coach</button>
    </nav>
    <div class="logo">Fin<span>Track</span></div>
    <div class="badge" id="appBadge">Stage 1 — Beta</div>
  </header>

  <div id="coachScreen" class="hidden">
    <div class="panel" style="margin-top: 24px;">
      <div class="panel-title">Your Financial Coach</div>
      <div id="coachingAdvice" style="line-height: 1.6; color: var(--text);"></div>
    </div>
  </div>

  <div id="dashboardScreen">
    <div class="cards">
      <div class="card income">
        <div class="card-icon">↑</div>
        <div class="card-label">Total Income</div>
        <div class="card-amount" id="totalIncome">$0.00</div>
      </div>
      <div class="card expense">
        <div class="card-icon">↓</div>
        <div class="card-label">Total Expenses</div>
        <div class="card-amount" id="totalExpense">$0.00</div>
      </div>
      <div class="card balance">
        <div class="card-icon">◈</div>
        <div class="card-label">Net Balance</div>
        <div class="card-amount" id="netBalance">$0.00</div>
      </div>
    </div>

    <div id="smartBudgetContainer" style="margin-bottom: 24px;"></div>

    <div class="main-grid">
      <div>
        <div class="panel chart-section" style="margin-bottom:24px;">
          <div class="panel-title">Spending Overview</div>
          <div class="chart-bars" id="chartBars"></div>
          <div class="chart-legend">
            <div class="legend-item"><div class="legend-dot" style="background:var(--income)"></div> Income</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--expense)"></div> Expense</div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">Recent Transactions</div>
          <div class="tx-list" id="txList"></div>
        </div>
      </div>

      <div style="display: flex; flex-direction: column; gap: 24px; height: fit-content; position: sticky; top: 24px;">
        
        <div class="panel">
          <div class="panel-title">Add Transaction</div>
          <div class="form-group">
            <label>Type</label>
            <div class="type-toggle">
              <button class="type-btn active income" onclick="setType('income')">+ Income</button>
              <button class="type-btn expense" onclick="setType('expense')">− Expense</button>
            </div>
          </div>
          <div class="form-group">
            <label>Description</label>
            <input type="text" id="desc" placeholder="e.g. Freelance payment" />
          </div>
          <div class="form-group">
            <label>Amount ($)</label>
            <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" />
          </div>
          <div class="form-group">
            <label>Category</label>
            <div class="categories" id="catChips"></div>
          </div>
          <div class="form-group">
            <label>Date</label>
            <input type="date" id="date" />
          </div>
          <button class="submit-btn" onclick="addTransaction()">Add Transaction</button>
        </div>

        <div class="panel" id="savingsGoalPanel">
          <div class="panel-title">Savings Goal</div>
          <div id="savingsGoalUIContent">
            <div class="form-group">
              <label>Target Amount ($)</label>
              <input type="number" id="goalAmount" placeholder="e.g. 5000" min="1" step="1"/>
            </div>
            <div class="form-group">
              <label>Target Date</label>
              <input type="date" id="goalDate" />
            </div>
            <button class="submit-btn" onclick="saveSavingsGoal()">Set Target Engine</button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAkBKhyDepFOkpE0II9GgjwSO5G1CH9A_4", 
    authDomain: "index-1d611.firebaseapp.com",
    projectId: "index-1d611",
    storageBucket: "index-1d611.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let transactions = [];
  let currentType = 'income';
  let selectedCat = '';
  let currentUser = null;
  let userName = 'there';
  let isPremiumUser = false;

  const incomeCategories = ['💼 Salary', '🎯 Freelance', '📈 Investment', '🎁 Gift', '📦 Other'];
  const expenseCategories = ['🍔 Food', '🚗 Transport', '🏠 Rent', '💊 Health', '🎮 Fun', '📦 Other'];

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      document.getElementById('loginScreen').classList.add('hidden');
      
      const userDocRef = doc(db, "users", user.uid);
      const userDocSnap = await getDoc(userDocRef);
      
      if (userDocSnap.exists() && userDocSnap.data().setup_done) {
        userName = userDocSnap.data().name;
        isPremiumUser = userDocSnap.data().isPremium === true;
        localStorage.setItem('fintrack_user_name', userName);
        document.getElementById('onboardingScreen').classList.add('hidden');
        
        updatePremiumBadgeStatus();
        await loadTransactions();
        await loadSavingsGoalFields();
      } else {
        document.getElementById('onboardingScreen').classList.remove('hidden');
        document.getElementById('loginScreen').classList.add('hidden');
      }
    } else {
      currentUser = null;
      document.getElementById('loginScreen').classList.remove('hidden');
      document.getElementById('onboardingScreen').classList.add('hidden');
    }
  });

  document.getElementById('date').value = new Date().toISOString().split('T')[0];
  renderCategories();

  function updatePremiumBadgeStatus() {
    const badge = document.getElementById('appBadge');
    if (isPremiumUser) {
      badge.textContent = "PRO Tier";
      badge.style.borderColor = "var(--gold)";
      badge.style.color = "var(--gold)";
    } else {
      badge.textContent = "Stage 1 — Beta";
      badge.style.borderColor = "var(--accent)";
      badge.style.color = "var(--accent)";
    }
  }

  async function handleLogin() {
    let email = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    
    if (!email || !pass) { alert("Please fill fields."); return; }
    if (!email.includes('@')) email += "@fintrack.io";
    
    btn.innerText = "Authenticating...";
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch (error) {
      if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
        try {
          await createUserWithEmailAndPassword(auth, email, pass);
        } catch (signUpError) {
          alert("Authentication Error: " + signUpError.message);
        }
      } else {
        alert("System Error: " + error.message);
      }
    }
    btn.innerText = "Sign In";
  }

  async function completeOnboarding() {
    const name = document.getElementById('userNameInput').value.trim();
    const income = parseFloat(document.getElementById('mainIncomeInput').value);
    const expense = parseFloat(document.getElementById('mainExpenseInput').value);

    if (name && !isNaN(income) && !isNaN(expense) && currentUser) {
      userName = name;
      localStorage.setItem('fintrack_user_name', name);

      await setDoc(doc(db, "users", currentUser.uid), { name, setup_done: true, isPremium: false });

      if (income > 0) {
        await addDoc(collection(db, "transactions"), {
          uid: currentUser.uid, id: Date.now(), type: 'income', desc: 'Initial Income Setup', amount: income, category: '💼 Salary', date: new Date().toISOString().split('T')[0]
        });
      }
      if (expense > 0) {
        await addDoc(collection(db, "transactions"), {
          uid: currentUser.uid, id: Date.now() + 1, type: 'expense', desc: 'Initial Expense Setup', amount: expense, category: '🏠 Rent', date: new Date().toISOString().split('T')[0]
        });
      }
      
      document.getElementById('onboardingScreen').classList.add('hidden');
      await loadTransactions();
    } else {
      alert("Please fill in valid details to continue.");
    }
  }

  async function triggerPremiumMockUpgrade() {
    if (!currentUser) return;
    try {
      const userDocRef = doc(db, "users", currentUser.uid);
      await setDoc(userDocRef, { isPremium: true }, { merge: true });
      isPremiumUser = true;
      updatePremiumBadgeStatus();
      alert("Upgrade Successful! Welcome to FinTrack Premium.");
      await loadTransactions();
      await loadSavingsGoalFields();
    } catch (err) {
      alert("Upgrade integration failed: " + err.message);
    }
  }

  async function loadSavingsGoalFields() {
    if (!currentUser) return;
    const goalRef = doc(db, "users", currentUser.uid, "savingsGoal", "current");
    try {
      const snap = await getDoc(goalRef);
      if (snap.exists()) {
        const data = snap.data();
        if(document.getElementById('goalAmount')) document.getElementById('goalAmount').value = data.targetAmount || '';
        if(document.getElementById('goalDate')) document.getElementById('goalDate').value = data.targetDate || '';
      }
    } catch (e) {
      console.error("Error retrieving goal configuration documents: ", e);
    }
  }

  async function saveSavingsGoal() {
    if (!currentUser) return;
    if (!isPremiumUser) {
      alert("Upgrade to Premium to set optimization targets.");
      return;
    }
    const targetAmount = parseFloat(document.getElementById('goalAmount').value);
    const targetDate = document.getElementById('goalDate').value;

    if (isNaN(targetAmount) || targetAmount <= 0 || !targetDate) {
      alert("Please fill in valid target operational fields.");
      return;
    }

    try {
      const goalRef = doc(db, "users", currentUser.uid, "savingsGoal", "current");
      await setDoc(goalRef, { targetAmount, targetDate, timestamp: Date.now() });
      alert("Savings Target parameters locked into the dynamic engine.");
      await executeSmartBudgetEngine();
    } catch (err) {
      alert("Failed locking values: " + err.message);
    }
  }

  async function loadTransactions() {
    if (!currentUser) return;
    const list = document.getElementById('txList');
    list.innerHTML = `<div class="empty-state">Syncing secure data cloud...</div>`;
    
    try {
      const q = query(collection(db, "transactions"), where("uid", "==", currentUser.uid));
      const querySnapshot = await getDocs(q);
      
      transactions = [];
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        transactions.push({ docId: doc.id, ...data });
      });
      
      transactions.sort((a, b) => b.id - a.id);
      render();
      await executeSmartBudgetEngine();
    } catch (error) {
      list.innerHTML = `<div class="empty-state" style="color:var(--expense)">Cloud error: ${error.message}</div>`;
    }
  }

  /* =========================================================================
     PREMIUM SMART BUDGET ENGINE CORE MECHANICAL UTILITIES
     ========================================================================= */
  function getRelativeMonthString(offsetMonths) {
    const d = new Date();
    d.setDate(1); // Eliminate day rollover boundary exceptions
    d.setMonth(d.getMonth() + offsetMonths);
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  }

  async function executeSmartBudgetEngine() {
    const renderBox = document.getElementById('smartBudgetContainer');
    if (!renderBox) return;

    if (!isPremiumUser) {
      renderBox.innerHTML = `
        <div class="panel premium-panel">
          <div class="premium-tag">Premium Upgrade</div>
          <div class="panel-title premium-title">Unlock Smart Budget Analysis</div>
          <p style="font-size: 0.9rem; line-height: 1.6; margin-bottom: 20px; color: #a5a5cc;">
            Upgrade to Premium to get personalised monthly spend and save recommendations based on your historical patterns, savings targets, and behavioral balance loops.
          </p>
          <button class="submit-btn premium-btn" onclick="triggerPremiumMockUpgrade()">Upgrade to Premium Tier</button>
        </div>
      `;
      return;
    }

    // Capture Core Date Ranges
    const currentMonthStr = getRelativeMonthString(0);
    const m1Str = getRelativeMonthString(-1);
    const m2Str = getRelativeMonthString(-2);
    const m3Str = getRelativeMonthString(-3);

    // Calculate Current Month Revenue Input
    const currentIncomesSum = transactions
      .filter(t => t.type === 'income' && t.date.startsWith(currentMonthStr))
      .reduce((s, t) => s + t.amount, 0);

    if (currentIncomesSum === 0) {
      renderBox.innerHTML = `
        <div class="panel premium-panel">
          <div class="premium-tag">PRO</div>
          <div class="panel-title premium-title">Smart Budget Tracker [${currentMonthStr}]</div>
          <p style="font-size: 0.85rem; color: var(--muted); text-align: center; padding: 20px 0;">
            Awaiting income ledger execution mapping for this calendar month interval.
          </p>
        </div>
      `;
      return;
    }

    // Step 1: Retrieve Carried-Over Reserve Token Value from Previous Month
    let carriedOver = 0;
    try {
      const prevMonthDocRef = doc(db, "users", currentUser.uid, "months", m1Str);
      const prevSnap = await getDoc(prevMonthDocRef);
      if (prevSnap.exists()) {
        carriedOver = prevSnap.data().toReserve || 0;
      }
    } catch (e) {
      console.error("Historical carry-over extraction trace bypassed:", e);
    }

    // Step 2: Sum Total Available Capital
    const totalAvailable = currentIncomesSum + carriedOver;

    // Step 3: Historic Spending Audits (3 Months Deep Profile)
    const getMonthExpenses = (mStr) => transactions.filter(t => t.type === 'expense' && t.date.startsWith(mStr)).reduce((s,t)=>s+t.amount,0);
    const getMonthIncome = (mStr) => transactions.filter(t => t.type === 'income' && t.date.startsWith(mStr)).reduce((s,t)=>s+t.amount,0);

    const expM1 = getMonthExpenses(m1Str);
    const expM2 = getMonthExpenses(m2Str);
    const expM3 = getMonthExpenses(m3Str);

    let activeMonthsCount = 0;
    let totalHistoricalExpenses = 0;
    if (expM1 > 0) { activeMonthsCount++; totalHistoricalExpenses += expM1; }
    if (expM2 > 0) { activeMonthsCount++; totalHistoricalExpenses += expM2; }
    if (expM3 > 0) { activeMonthsCount++; totalHistoricalExpenses += expM3; }
    const averageSpending = activeMonthsCount > 0 ? (totalHistoricalExpenses / activeMonthsCount) : 0;

    // Step 4: Evaluate Behavior Matrix Overspending Triggers
    const isOverspent = (mStr) => {
      const inc = getMonthIncome(mStr);
      const exp = getMonthExpenses(mStr);
      return exp > inc && inc > 0;
    };

    const overspentM1 = isOverspent(m1Str);
    const overspentM2 = isOverspent(m2Str);

    // Step 5 & 6 & 7: Allocation Engine Ratios Calculations
    let spendPercent = 60;
    let reservePercent = 40;
    let insight = "Your standard allocation matrix is active, keeping spending aligned with default savings boundaries.";

    if (overspentM1 && overspentM2) {
      reservePercent = 55; // +15% Reserve Shift
      spendPercent = 45;
      insight = "Consecutive overspending detected over the last two months. Your reserve threshold has been tightened by 15% to safeguard your balance.";
    } else if (overspentM1) {
      reservePercent = 48; // +8% Reserve Shift
      spendPercent = 52;
      insight = "You spent slightly more than your income last month. We have safely expanded your reserve pool to absorb the variance.";
    } else if (activeMonthsCount > 0 && !overspentM1 && expM1 > 0) {
      reservePercent = 35; // Allow up to 5% more spending
      spendPercent = 65;
      insight = "Excellent surplus management detected last month. You have unlocked up to 5% extra flexible spending capacity for this period.";
    }

    // Step 8: Overriding Calculations Against Savings Goals Target Vectors
    try {
      const goalRef = doc(db, "users", currentUser.uid, "savingsGoal", "current");
      const goalSnap = await getDoc(goalRef);
      if (goalSnap.exists()) {
        const gData = goalSnap.data();
        const targetAmount = gData.targetAmount;
        const targetDate = new Date(gData.targetDate);
        const today = new Date();

        // Calculate time delta metrics
        const totalMonthsRemaining = (targetDate.getFullYear() - today.getFullYear()) * 12 + (targetDate.getMonth() - today.getMonth());
        
        if (totalMonthsRemaining > 0 && targetAmount > carriedOver) {
          const deficiency = targetAmount - carriedOver; 
          const monthlyNeeded = deficiency / totalMonthsRemaining;
          const targetNeededPercent = Math.ceil((monthlyNeeded / totalAvailable) * 100);

          if (targetNeededPercent > reservePercent) {
            reservePercent = targetNeededPercent;
            spendPercent = 100 - reservePercent;
            insight = `Prioritising your locked savings goal milestone. Adjusting your monthly allocation to secure the required monthly target.`;
          }
        }
      }
    } catch (goalErr) {
      console.error("Savings Goal evaluation loop bypassed:", goalErr);
    }

    // Step 9: Enforcement of Operational Security Boundary Constraints
    if (reservePercent < 20) {
      reservePercent = 20;
      spendPercent = 80;
    }
    if (spendPercent > 75) {
      spendPercent = 75;
      reservePercent = 25;
    }

    // Harmonize matching arrays
    const totalCheck = spendPercent + reservePercent;
    if(totalCheck !== 100) {
      spendPercent = 100 - reservePercent;
    }

    const spendLimit = (spendPercent / 100) * totalAvailable;
    const toReserve = (reservePercent / 100) * totalAvailable;

    // Assemble Data Engine Export Document
    const calculationExportPayload = {
      newIncome: currentIncomesSum,
      carriedOver,
      totalAvailable,
      spendLimit,
      toReserve,
      spendPercent,
      reservePercent,
      insight,
      timestamp: Date.now()
    };

    // Push calculations payload out into users sub-collection
    try {
      const currentMonthDocRef = doc(db, "users", currentUser.uid, "months", currentMonthStr);
      await setDoc(currentMonthDocRef, calculationExportPayload, { merge: true });
    } catch (fsWriteErr) {
      console.error("Failed persisting calculation schemas: ", fsWriteErr);
    }

    // Step 10: Display the Premium UI Card Workspace
    renderBox.innerHTML = `
      <div class="panel premium-panel">
        <div class="premium-tag">PRO Tier Engine</div>
        <div class="panel-title premium-title">Smart Budget Strategy — ${currentMonthStr}</div>
        
        <p style="font-size:0.8rem; color:var(--muted); margin-bottom: 4px;">Dynamic Monthly Liquidity Pool</p>
        <div style="font-family:'Syne', sans-serif; font-size: 2.25rem; font-weight:800; color:var(--text); margin-bottom:4px;">
          ${fmt(totalAvailable)}
        </div>
        <p style="font-size:0.65rem; color:var(--accent); letter-spacing:0.5px; margin-bottom:16px;">
          (Current Revenue: ${fmt(currentIncomesSum)} + Carried Reserve: ${fmt(carriedOver)})
        </p>

        <div class="metric-row">
          <div class="metric-box" style="border-left: 3px solid var(--accent2);">
            <div style="font-size:0.65rem; color:var(--muted); text-transform:uppercase;">Spend Limit (${spendPercent}%)</div>
            <div class="metric-val" style="color:var(--accent2);">${fmt(spendLimit)}</div>
          </div>
          <div class="metric-box" style="border-left: 3px solid var(--gold);">
            <div style="font-size:0.65rem; color:var(--muted); text-transform:uppercase;">To Reserve (${reservePercent}%)</div>
            <div class="metric-val" style="color:var(--gold);">${fmt(toReserve)}</div>
          </div>
        </div>

        <div class="progress-container">
          <div class="progress-fill-spend" style="width: ${spendPercent}%"></div>
          <div class="progress-fill-reserve" style="width: ${reservePercent}%"></div>
        </div>

        <p style="font-size:0.8rem; line-height:1.5; color:#c1c1df; font-style:italic; background:rgba(255,255,255,0.02); padding:12px; border-radius:8px; border:1px solid rgba(255,255,255,0.04);">
          ⚡ "${insight}"
        </p>
      </div>
    `;
  }
  /* ========================================================================= */

  function switchScreen(screenId, btnId) {
    document.getElementById('dashboardScreen').classList.add('hidden');
    document.getElementById('coachScreen').classList.add('hidden');
    document.getElementById('navDashboard').classList.remove('active');
    document.getElementById('navCoach').classList.remove('active');

    document.getElementById(screenId).classList.remove('hidden');
    document.getElementById(btnId).classList.add('active');

    if (screenId === 'coachScreen') generateAdvice();
  }

  function generateAdvice() {
    const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    const adviceBox = document.getElementById('coachingAdvice');

    let advice = "";
    if (income === 0 && expense === 0) {
      advice = `👋 <strong>Welcome, ${userName}!</strong> Add transactions so I can start analyzing your workspace.`;
    } else if (income === 0 && expense > 0) {
      advice = `⚠️ <strong>Warning, ${userName}:</strong> Expenses exist without recorded income. Log incoming revenue.`;
    } else if (expense > income * 0.8) {
      advice = `🚨 <strong>Alert:</strong> Spending is over 80% of earnings! Review your luxury expenses.`;
    } else if (expense > income * 0.5) {
      advice = `⚖️ <strong>Steady, ${userName}:</strong> Moderate outflows detected. Save 20% of remaining balance for security.`;
    } else {
      advice = `🚀 <strong>Great job, ${userName}!</strong> Outflows are controlled under 50%. Allocate surplus cleanly into safe structures.`;
    }

    adviceBox.innerHTML = `
      <div style="margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border);">
        <div style="color: var(--income); margin-bottom: 4px; font-size: 1.2rem;"><strong>Total Income:</strong> $${income.toFixed(2)}</div>
        <div style="color: var(--expense); font-size: 1.2rem;"><strong>Total Expenses:</strong> $${expense.toFixed(2)}</div>
      </div>
      <p style="font-size: 1.1rem;">${advice}</p>
    `;
  }

  function setType(type) {
    currentType = type;
    selectedCat = '';
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.type-btn.${type}`).classList.add('active');
    renderCategories();
  }

  function renderCategories() {
    const cats = currentType === 'income' ? incomeCategories : expenseCategories;
    const el = document.getElementById('catChips');
    el.innerHTML = cats.map(c => `
      <button class="cat-chip ${selectedCat === c ? 'selected' : ''}" onclick="selectCat('${c}')">${c}</button>
    `).join('');
  }

  function selectCat(cat) {
    selectedCat = cat;
    renderCategories();
  }

  async function addTransaction() {
    const desc = document.getElementById('desc').value.trim();
    const amount = parseFloat(document.getElementById('amount').value);
    const date = document.getElementById('date').value;

    if (!desc || !amount || amount <= 0 || !currentUser) {
      alert("Please enter a valid description and amount.");
      return;
    }

    const tx = {
      uid: currentUser.uid,
      id: Date.now(),
      type: currentType,
      desc,
      amount,
      category: selectedCat || '📦 Other',
      date: date || new Date().toISOString().split('T')[0]
    };

    try {
      await addDoc(collection(db, "transactions"), tx);
      document.getElementById('desc').value = '';
      document.getElementById('amount').value = '';
      await loadTransactions();
    } catch(err) {
      alert("Error uploading item: " + err.message);
    }
  }

  async function deleteTransaction(docId) {
    if (!docId) return;
    try {
      await deleteDoc(doc(db, "transactions", docId));
      await loadTransactions();
    } catch(err) {
      alert("Error deleting file: " + err.message);
    }
  }

  function fmt(n) {
    return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }

  function render() {
    const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    const balance = income - expense;

    document.getElementById('totalIncome').textContent = fmt(income);
    document.getElementById('totalExpense').textContent = fmt(expense);
    const balEl = document.getElementById('netBalance');
    balEl.textContent = fmt(balance);
    balEl.style.color = balance >= 0 ? 'var(--accent3)' : 'var(--expense)';

    const list = document.getElementById('txList');
    if (transactions.length === 0) {
      list.innerHTML = `<div class="empty-state"><span class="emoji">💳</span>No transactions yet.<br>Add your first one →</div>`;
    } else {
      list.innerHTML = transactions.map(t => `
        <div class="tx-item">
          <div class="tx-left">
            <div class="tx-icon ${t.type}">${t.type === 'income' ? '↑' : '↓'}</div>
            <div>
              <div class="tx-name">${t.desc}</div>
              <div class="tx-meta">${t.category} · ${t.date}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;">
            <div class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</div>
            <button class="tx-delete" onclick="deleteTransaction('${t.docId}')">✕</button>
          </div>
        </div>
      `).join('');
    }
    renderChart();
  }

  function renderChart() {
    const months = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date();
      d.setMonth(d.getMonth() - i);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      const label = d.toLocaleString('default', { month: 'short' });
      const inc = transactions.filter(t => t.type === 'income' && t.date.startsWith(key)).reduce((s,t) => s+t.amount, 0);
      const exp = transactions.filter(t => t.type === 'expense' && t.date.startsWith(key)).reduce((s,t) => s+t.amount, 0);
      months.push({ label, inc, exp });
    }

    const max = Math.max(...months.map(m => Math.max(m.inc, m.exp)), 1);
    const barsEl = document.getElementById('chartBars');
    barsEl.innerHTML = months.map(m => `
      <div class="bar-wrap">
        <div style="display:flex;gap:2px;align-items:flex-end;width:100%;height:70px;">
          <div class="bar income-bar" style="height:${(m.inc/max)*70}px;flex:1;"></div>
          <div class="bar expense-bar" style="height:${(m.exp/max)*70}px;flex:1;"></div>
        </div>
        <div class="bar-label">${m.label}</div>
      </div>
    `).join('');
  }

  // Handle cross-scope functional visibility requirements
  window.handleLogin = handleLogin;
  window.completeOnboarding = completeOnboarding;
  window.switchScreen = switchScreen;
  window.setType = setType;
  window.selectCat = selectCat;
  window.addTransaction = addTransaction;
  window.deleteTransaction = deleteTransaction;
  window.triggerPremiumMockUpgrade = triggerPremiumMockUpgrade;
  window.saveSavingsGoal = saveSavingsGoal;
</script>
</body>
</html>
