<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinTrack — Your Money, Simplified</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #00e5a0;
    --accent2: #ff6b6b;
    --accent3: #ffd166;
    --text: #f0f0f8;
    --muted: #6b6b88;
    --income: #00e5a0;
    --expense: #ff6b6b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(0,229,160,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255,107,107,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Crucial rule for switching screens */
  .hidden {
    display: none !important;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    padding: 28px 0 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: fadeDown 0.6s ease both;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  .badge {
    font-size: 0.65rem;
    padding: 4px 10px;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Summary Cards */
  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin: 32px 0;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s ease both;
    transition: transform 0.2s, border-color 0.2s;
  }

  .card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.2s; }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
  }

  .card.expense::before { background: var(--expense); }
  .card.balance::before { background: var(--accent3); }

  .card-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
  }

  .card-amount {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -1px;
  }

  .card.income .card-amount { color: var(--income); }
  .card.expense .card-amount { color: var(--expense); }
  .card.balance .card-amount { color: var(--accent3); }

  .card-icon {
    position: absolute;
    top: 20px; right: 20px;
    font-size: 1.5rem;
    opacity: 0.3;
  }

  /* Main Layout */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 24px;
    margin-bottom: 40px;
  }

  /* Add Transaction Form */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    animation: fadeUp 0.6s ease 0.3s both;
  }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 24px;
    color: var(--text);
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title::before {
    content: ''; width: 8px; height: 8px; background: var(--accent);
    border-radius: 50%; display: inline-block;
  }

  .form-group { margin-bottom: 16px; }

  label {
    display: block; font-size: 0.7rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
  }

  input, select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 0.9rem;
    transition: border-color 0.2s, box-shadow 0.2s; outline: none;
  }

  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,160,0.1); }
  input::placeholder { color: var(--muted); }

  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .type-btn {
    padding: 10px; border-radius: 10px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 1px;
  }

  .type-btn:hover { background: var(--surface2); }
  .type-btn.active.income { background: rgba(0,229,160,0.1); border-color: var(--income); color: var(--income); }
  .type-btn.active.expense { background: rgba(255,107,107,0.1); border-color: var(--expense); color: var(--expense); }

  .nav-btn {
    padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border);
    background: transparent; color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .nav-btn:hover { background: var(--surface2); border-color: var(--accent); }
  .nav-btn.active { background: rgba(0,229,160,0.1); border-color: var(--accent); color: var(--accent); }

  .submit-btn {
    width: 100%; padding: 14px; background: var(--accent); color: #0a0a0f;
    border: none; border-radius: 10px; font-family: 'Syne', sans-serif;
    font-size: 0.9rem; font-weight: 700; cursor: pointer;
    letter-spacing: 0.5px; margin-top: 8px; transition: all 0.2s;
    text-transform: uppercase;
  }

  .submit-btn:hover { background: #00ffb3; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,229,160,0.3); }

  /* Chart */
  .chart-section { margin-bottom: 24px; }
  .chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 80px; padding: 8px 0; }
  .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
  .bar { width: 100%; border-radius: 4px 4px 0 0; transition: height 0.4s; min-height: 4px; }
  .bar.income-bar { background: var(--income); opacity: 0.8; }
  .bar.expense-bar { background: var(--expense); opacity: 0.8; }
  .bar-label { font-size: 0.6rem; color: var(--muted); text-align: center; }
  .chart-legend { display: flex; gap: 16px; margin-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.7rem; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* Transaction List */
  .tx-list { display: flex; flex-direction: column; gap: 10px; }
  .tx-item {
    display: flex; align-items: center; justify-content: space-between; padding: 14px 16px;
    background: var(--surface2); border-radius: 12px; border: 1px solid transparent; transition: all 0.2s;
  }
  .tx-item:hover { border-color: var(--border); transform: translateX(4px); }
  .tx-left { display: flex; align-items: center; gap: 12px; }
  .tx-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
  .tx-icon.income { background: rgba(0,229,160,0.1); }
  .tx-icon.expense { background: rgba(255,107,107,0.1); }
  .tx-name { font-size: 0.85rem; color: var(--text); margin-bottom: 2px; }
  .tx-meta { font-size: 0.65rem; color: var(--muted); }
  .tx-amount { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
  .tx-amount.income { color: var(--income); }
  .tx-amount.expense { color: var(--expense); }
  .tx-delete {
    background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.8rem;
    padding: 4px 6px; border-radius: 6px; margin-left: 8px; opacity: 0; transition: all 0.2s;
  }
  .tx-item:hover .tx-delete { opacity: 1; }
  .tx-delete:hover { background: rgba(255,107,107,0.15); color: var(--expense); }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 0.8rem; line-height: 1.8; }
  .empty-state .emoji { font-size: 2rem; display: block; margin-bottom: 12px; }

  /* Categories */
  .categories { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .cat-chip {
    padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.65rem;
    cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px;
  }
  .cat-chip:hover, .cat-chip.selected { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,0.08); }

  /* Login / Overlays */
  .login-container {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .login-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  }

  /* Animations */
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

</style>
</head>
<body>

<div class="login-container" id="onboardingScreen">
  <div class="login-box">
    <div class="logo" style="text-align: center; margin-bottom: 8px;">Fin<span>Track</span></div>
    <h2 style="font-size: 1.2rem; margin-bottom: 20px; text-align: center;">Welcome! Let's set up your profile.</h2>
    <div class="form-group">
      <label>Your Name</label>
      <input type="text" id="userNameInput" placeholder="John Doe" />
    </div>
    <div class="form-group">
      <label>Main Monthly Income ($)</label>
      <input type="number" id="mainIncomeInput" placeholder="e.g. 3000" />
    </div>
    <div class="form-group">
      <label>Main Monthly Expense ($)</label>
      <input type="number" id="mainExpenseInput" placeholder="e.g. 1000" />
    </div>
    <button class="submit-btn" onclick="completeOnboarding()">Save & Start Tracking</button>
  </div>
</div>

<div class="login-container" id="loginScreen">
  <div class="login-box">
    <div class="logo" style="text-align: center; margin-bottom: 8px;">Fin<span>Track</span></div>
    <p style="color: var(--muted); text-align: center; font-size: 0.8rem; margin-bottom: 24px;">Please sign in to access your dashboard</p>
    <div class="form-group">
      <label>Username / Email</label>
      <input type="text" id="username" placeholder="enter any username" value="admin" />
    </div>
    <div class="form-group" style="margin-bottom: 24px;">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" value="password" />
    </div>
    <button class="submit-btn" onclick="handleLogin()">Sign In</button>
  </div>
</div>

<div class="container">
  <header>
    <nav style="display: flex; gap: 10px;">
      <button id="navDashboard" class="nav-btn active" onclick="switchScreen('dashboardScreen', 'navDashboard')">Dashboard</button>
      <button id="navCoach" class="nav-btn" onclick="switchScreen('coachScreen', 'navCoach')">Financial Coach</button>
    </nav>
    <div class="logo">Fin<span>Track</span></div>
    <div class="badge">Stage 1 — Beta</div>
  </header>

  <div id="coachScreen" class="hidden">
    <div class="panel" style="margin-top: 24px;">
      <div class="panel-title">Your Financial Coach</div>
      <div id="coachingAdvice" style="line-height: 1.6; color: var(--text);">
        </div>
    </div>
  </div>

  <div id="dashboardScreen">
    <div class="cards">
      <div class="card income">
        <div class="card-icon">↑</div>
        <div class="card-label">Total Income</div>
        <div class="card-amount" id="totalIncome">$0.00</div>
      </div>
      <div class="card expense">
        <div class="card-icon">↓</div>
        <div class="card-label">Total Expenses</div>
        <div class="card-amount" id="totalExpense">$0.00</div>
      </div>
      <div class="card balance">
        <div class="card-icon">◈</div>
        <div class="card-label">Net Balance</div>
        <div class="card-amount" id="netBalance">$0.00</div>
      </div>
    </div>

    <div class="main-grid">
      <div>
        <div class="panel chart-section" style="margin-bottom:24px;">
          <div class="panel-title">Spending Overview</div>
          <div class="chart-bars" id="chartBars"></div>
          <div class="chart-legend">
            <div class="legend-item"><div class="legend-dot" style="background:var(--income)"></div> Income</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--expense)"></div> Expense</div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">Recent Transactions</div>
          <div class="tx-list" id="txList">
            </div>
        </div>
      </div>

      <div class="panel" style="height:fit-content; position:sticky; top:24px;">
        <div class="panel-title">Add Transaction</div>
        <div class="form-group">
          <label>Type</label>
          <div class="type-toggle">
            <button class="type-btn active income" onclick="setType('income')">+ Income</button>
            <button class="type-btn expense" onclick="setType('expense')">− Expense</button>
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <input type="text" id="desc" placeholder="e.g. Freelance payment" />
        </div>
        <div class="form-group">
          <label>Amount ($)</label>
          <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div class="form-group">
          <label>Category</label>
          <div class="categories" id="catChips"></div>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="date" />
        </div>
        <button class="submit-btn" onclick="addTransaction()">Add Transaction</button>
      </div>
    </div>
  </div>
</div>

<script>
  // 1. Data Initialization (Using localStorage so it works instantly)
  let transactions = JSON.parse(localStorage.getItem('fintrack_data') || '[]');
  let currentType = 'income';
  let selectedCat = '';

  const incomeCategories = ['💼 Salary', '🎯 Freelance', '📈 Investment', '🎁 Gift', '📦 Other'];
  const expenseCategories = ['🍔 Food', '🚗 Transport', '🏠 Rent', '💊 Health', '🎮 Fun', '📦 Other'];

  // 2. Authentication & Onboarding Checks
  window.addEventListener('DOMContentLoaded', () => {
    // Check Login
    if (localStorage.getItem('fintrack_logged_in') === 'true') {
      document.getElementById('loginScreen').classList.add('hidden');
    }
    // Check Onboarding
    if (localStorage.getItem('fintrack_setup_done') === 'true') {
      document.getElementById('onboardingScreen').classList.add('hidden');
    }

    // Set today's date in the form
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    
    renderCategories();
    render();
  });

  function handleLogin() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;
    if (user && pass) {
      localStorage.setItem('fintrack_logged_in', 'true');
      document.getElementById('loginScreen').classList.add('hidden');
    }
  }

  function completeOnboarding() {
    const name = document.getElementById('userNameInput').value.trim();
    const income = parseFloat(document.getElementById('mainIncomeInput').value);
    const expense = parseFloat(document.getElementById('mainExpenseInput').value);

    if (name && !isNaN(income) && !isNaN(expense)) {
      localStorage.setItem('fintrack_user_name', name);
      localStorage.setItem('fintrack_setup_done', 'true');

      // Add initial setup data as first transactions
      if (income > 0) {
        transactions.push({ id: Date.now(), type: 'income', desc: 'Initial Income Setup', amount: income, category: '💼 Salary', date: new Date().toISOString().split('T')[0] });
      }
      if (expense > 0) {
        transactions.push({ id: Date.now() + 1, type: 'expense', desc: 'Initial Expense Setup', amount: expense, category: '🏠 Rent', date: new Date().toISOString().split('T')[0] });
      }
      
      saveData();
      render();
      document.getElementById('onboardingScreen').classList.add('hidden');
    } else {
      alert("Please fill in valid numbers to continue.");
    }
  }

  // 3. Navigation Logic (The fix for switching screens)
  function switchScreen(screenId, btnId) {
    // Hide all screens
    document.getElementById('dashboardScreen').classList.add('hidden');
    document.getElementById('coachScreen').classList.add('hidden');
    
    // Remove active class from buttons
    document.getElementById('navDashboard').classList.remove('active');
    document.getElementById('navCoach').classList.remove('active');

    // Show selected screen and highlight button
    document.getElementById(screenId).classList.remove('hidden');
    document.getElementById(btnId).classList.add('active');

    // If Coach is opened, run the advice engine
    if (screenId === 'coachScreen') {
      generateAdvice();
    }
  }

  // 4. Financial Coach Logic
  function generateAdvice() {
    const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    const adviceBox = document.getElementById('coachingAdvice');
    const name = localStorage.getItem('fintrack_user_name') || 'there';

    let advice = "";
    if (income === 0 && expense === 0) {
      advice = `👋 <strong>Welcome, ${name}!</strong> Add your first income and expenses on the dashboard so I can start analyzing your financial health.`;
    } else if (income === 0 && expense > 0) {
      advice = `⚠️ <strong>Warning, ${name}:</strong> You have expenses but no recorded income. Make sure to log your income to see your true balance.`;
    } else if (expense > income * 0.8) {
      advice = `🚨 <strong>Alert:</strong> You are spending over 80% of your income! Review your recent transactions and try to cut back on non-essential categories.`;
    } else if (expense > income * 0.5) {
      advice = `⚖️ <strong>Steady, ${name}:</strong> You are spending a moderate amount. Try to set aside 20% of your remaining balance for emergencies.`;
    } else {
      advice = `🚀 <strong>Great job, ${name}!</strong> You are spending less than 50% of your income. Consider moving your surplus into a high-yield savings account.`;
    }

    adviceBox.innerHTML = `
      <div style="margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border);">
        <div style="color: var(--income); margin-bottom: 4px; font-size: 1.2rem;"><strong>Total Income:</strong> $${income.toFixed(2)}</div>
        <div style="color: var(--expense); font-size: 1.2rem;"><strong>Total Expenses:</strong> $${expense.toFixed(2)}</div>
      </div>
      <p style="font-size: 1.1rem;">${advice}</p>
    `;
  }

  // 5. Transaction Logic
  function setType(type) {
    currentType = type;
    selectedCat = '';
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.type-btn.${type}`).classList.add('active');
    renderCategories();
  }

  function renderCategories() {
    const cats = currentType === 'income' ? incomeCategories : expenseCategories;
    const el = document.getElementById('catChips');
    el.innerHTML = cats.map(c => `
      <button class="cat-chip ${selectedCat === c ? 'selected' : ''}" onclick="selectCat('${c}')">${c}</button>
    `).join('');
  }

  function selectCat(cat) {
    selectedCat = cat;
    renderCategories();
  }

  function addTransaction() {
    const desc = document.getElementById('desc').value.trim();
    const amount = parseFloat(document.getElementById('amount').value);
    const date = document.getElementById('date').value;

    if (!desc || !amount || amount <= 0) {
      alert("Please enter a valid description and amount.");
      return;
    }

    const tx = {
      id: Date.now(),
      type: currentType,
      desc,
      amount,
      category: selectedCat || '📦 Other',
      date: date || new Date().toISOString().split('T')[0]
    };

    transactions.unshift(tx);
    saveData();
    render();

    // Reset Form
    document.getElementById('desc').value = '';
    document.getElementById('amount').value = '';
  }

  function deleteTransaction(id) {
    transactions = transactions.filter(t => t.id !== id);
    saveData();
    render();
  }

  function saveData() {
    localStorage.setItem('fintrack_data', JSON.stringify(transactions));
  }

  // 6. Rendering Logic
  function fmt(n) {
    return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }

  function render() {
    const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    const balance = income - expense;

    document.getElementById('totalIncome').textContent = fmt(income);
    document.getElementById('totalExpense').textContent = fmt(expense);
    const balEl = document.getElementById('netBalance');
    balEl.textContent = fmt(balance);
    balEl.style.color = balance >= 0 ? 'var(--accent3)' : 'var(--expense)';

    const list = document.getElementById('txList');
    if (transactions.length === 0) {
      list.innerHTML = `<div class="empty-state"><span class="emoji">💳</span>No transactions yet.<br>Add your first one →</div>`;
    } else {
      list.innerHTML = transactions.map(t => `
        <div class="tx-item">
          <div class="tx-left">
            <div class="tx-icon ${t.type}">${t.type === 'income' ? '↑' : '↓'}</div>
            <div>
              <div class="tx-name">${t.desc}</div>
              <div class="tx-meta">${t.category} · ${t.date}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;">
            <div class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</div>
            <button class="tx-delete" onclick="deleteTransaction(${t.id})">✕</button>
          </div>
        </div>
      `).join('');
    }
    renderChart();
  }

  function renderChart() {
    const months = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date();
      d.setMonth(d.getMonth() - i);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      const label = d.toLocaleString('default', { month: 'short' });
      const inc = transactions.filter(t => t.type === 'income' && t.date.startsWith(key)).reduce((s,t) => s+t.amount, 0);
      const exp = transactions.filter(t => t.type === 'expense' && t.date.startsWith(key)).reduce((s,t) => s+t.amount, 0);
      months.push({ label, inc, exp });
    }

    const max = Math.max(...months.map(m => Math.max(m.inc, m.exp)), 1);
    const barsEl = document.getElementById('chartBars');
    barsEl.innerHTML = months.map(m => `
      <div class="bar-wrap">
        <div style="display:flex;gap:2px;align-items:flex-end;width:100%;height:70px;">
          <div class="bar income-bar" style="height:${(m.inc/max)*70}px;flex:1;"></div>
          <div class="bar expense-bar" style="height:${(m.exp/max)*70}px;flex:1;"></div>
        </div>
        <div class="bar-label">${m.label}</div>
      </div>
    `).join('');
  }
</script>
</body>
</html>
